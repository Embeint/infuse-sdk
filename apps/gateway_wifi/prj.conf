# WiFi Gateway options
CONFIG_INFUSE_SDK=y
CONFIG_INFUSE_WATCHDOG=y
CONFIG_EPACKET_FORWARDING=y
CONFIG_EPACKET_PROCESS_THREAD_SPLIT=y
CONFIG_EPACKET_PACKET_SIZE_MAX=1360
CONFIG_EPACKET_BUFFERS_TX=10
CONFIG_EPACKET_BUFFERS_RX=8
CONFIG_MAIN_STACK_SIZE=4096

# TDF announce sending
CONFIG_TASK_RUNNER=y
CONFIG_TASK_RUNNER_AUTO_ITERATE=y
CONFIG_TASK_RUNNER_TASK_TDF_LOGGER=y

# Bluetooth
CONFIG_BT_CENTRAL=y
CONFIG_BT_DEVICE_NAME="WiFi Gateway"

# WiFi
CONFIG_NETWORKING=y
CONFIG_WIFI=y
CONFIG_WIFI_USAGE_MODE_STA=y

# WiFi throughput testing
CONFIG_NET_ZPERF=y
CONFIG_INFUSE_RPC_COMMAND_ZPERF_UPLOAD=y

# Throughput tends to be CPU limited
CONFIG_PICOLIBC_USE_MODULE=y
CONFIG_SPEED_OPTIMIZATIONS=y

# Group packets for TX efficiency
CONFIG_EPACKET_RECEIVE_GROUPING=y
CONFIG_EPACKET_RECEIVE_GROUPING_MAX_HOLD_MS=250

# Only connects when we request
CONFIG_CONN_MGR_WIFI_KV_STORE_AUTO_CONNECT=n
CONFIG_CONN_MGR_WIFI_KV_STORE_PERSISTENT=y

# As a high-throughput gateway we want more frequent ACKs
CONFIG_EPACKET_INTERFACE_UDP_ACK_PERIOD_SEC=300

# Gateway RPCs
CONFIG_INFUSE_RPC_CLIENT=y
