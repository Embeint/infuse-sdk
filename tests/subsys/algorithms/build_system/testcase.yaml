common:
  tags: algorithms
  min_flash: 64
  min_ram: 32
  platform_allow:
    - mps2/an385      # Cortex-M3
    - mps2/an386      # Cortex-M4
    - mps2/an521/cpu0 # Cortex-M33
  integration_platforms:
    - mps2/an385      # Cortex-M3
    - mps2/an386      # Cortex-M4
    - mps2/an521/cpu0 # Cortex-M33
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "INIT"
      - "RUN: 0 RUN\\*2.75: 0.00 RUN\\^2: 0"
      - "3700 mV -100 uA 70%"
      - "RUN: 1 RUN\\*2.75: 2.75 RUN\\^2: 1"
      - "3700 mV -100 uA 70%"
      - "RUN: 2 RUN\\*2.75: 5.50 RUN\\^2: 4"
      - "3700 mV -100 uA 70%"
tests:
  algorithms.build_system.native:
    extra_configs:
      - CONFIG_TEST_ALGORITHM_BUILD_NATIVE=y
  algorithms.build_system.llext:
    extra_configs:
      - CONFIG_TEST_ALGORITHM_BUILD_LLEXT=y
      - CONFIG_FPU=n
  algorithms.build_system.llext.softabi:
    filter: CONFIG_CPU_HAS_FPU
    extra_configs:
      - CONFIG_TEST_ALGORITHM_BUILD_LLEXT=y
      - CONFIG_FP_SOFTABI=y
  algorithms.build_system.llext.hardabi:
    filter: CONFIG_CPU_HAS_FPU
    extra_configs:
      - CONFIG_TEST_ALGORITHM_BUILD_LLEXT=y
      - CONFIG_FP_HARDABI=y
