# The west manifest file for the Infuse SDK.
#
# SPDX-License-Identifier: FSL-1.1-ALv2

manifest:
  defaults:
    remote: embeint

  remotes:
    - name: embeint
      url-base: https://github.com/embeint
    - name: memfault
      url-base: https://github.com/memfault

  projects:
    - name: zephyr
      revision: embeint-v4.4.0
      # Limit imported repositories to reduce clone time
      import:
        name-allowlist:
          - cmsis-dsp
          - cmsis_6
          - hal_nordic
          - hal_st
          - hal_stm32
          - hostap
          - libmetal
          - lora-basics-modem
          - loramac-node
          - fatfs
          - mbedtls
          - open-amp
          - segger
          - nrf_wifi
          - tf-psa-crypto
          - tinycrypt
          - trusted-firmware-m
          - picolibc
          - zcbor
    - name: mcuboot
      revision: embeint-v4.4.0
      path: bootloader/mcuboot
    - name: sdk-nrf
      path: modules/nrfconnect/sdk-nrf
      revision: feature/v3.3.0
      import: true
    - name: memfault-firmware-sdk
      path: modules/lib/memfault
      revision: 1.37.1
      remote: memfault

  self:
    path: infuse-sdk
    west-commands: scripts/west-commands.yml
    import: submanifests
