name: clang-format

on:
  pull_request:
    paths:
    - '.github/workflows/clang-format.yml'
    - '**/*.c'
    - '**/*.h'

permissions:
  contents: read

jobs:
  formatting-check:
    name: Formatting check on repository
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Run clang-format style check.
      uses: jidicula/clang-format-action@654a770daa28443dd111d133e4083e21c1075674 # v4.18.0
      with:
        # Default version shipped with `ms-vscode.cpptools`
        clang-format-version: '21'
        exclude-regex: (lib/crypto/ascon)|(lib/crypto/XKCP)
