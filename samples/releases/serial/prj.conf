# USB Gateway options
CONFIG_INFUSE_SDK=y
CONFIG_INFUSE_WATCHDOG=y

# Tasks
CONFIG_TASK_RUNNER=y
CONFIG_TASK_RUNNER_AUTO_ITERATE=y
CONFIG_TASK_RUNNER_TASK_TDF_LOGGER=y
CONFIG_TASK_RUNNER_TASK_BATTERY=y

CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_PM_DEVICE_RUNTIME=n

CONFIG_UART_USE_RUNTIME_CONFIGURE=y

CONFIG_NET_DRIVERS=y
CONFIG_NET_PPP=y
CONFIG_NET_L2_PPP=y
CONFIG_NETWORKING=y
CONFIG_MODEM=y
CONFIG_MODEM_CELLULAR=y

CONFIG_MODEM_AT_USER_PIPE=y
CONFIG_INFUSE_RPC_COMMAND_LTE_AT_CMD=y

CONFIG_MODEM_CMUX_MTU=1400
CONFIG_MODEM_CMUX_WORK_BUFFER_SIZE=1407
CONFIG_MODEM_CELLULAR_UART_BUFFER_SIZES=1500
CONFIG_MODEM_CELLULAR_CHAT_BUFFER_SIZE=256
CONFIG_MODEM_CELLULAR_USER_PIPE_BUFFER_SIZES=256

CONFIG_NET_IF_MAX_IPV4_COUNT=2

CONFIG_NET_LOG=y
CONFIG_MODEM_LOG_LEVEL_INF=y
CONFIG_MODEM_MODULES_LOG_LEVEL_INF=y
CONFIG_NET_L2_PPP_LOG_LEVEL_INF=y
CONFIG_LOG_BUFFER_SIZE=8192
